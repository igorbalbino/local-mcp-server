services:
  local-mcp:
    image: ghcr.io/igorbalbino/local-mcp:latest
    container_name: local-mcp
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8090}:8080"
    env_file:
      - .env
    volumes:
      - ./storage/logs:/app/storage/logs
      - ./storage/cache:/app/storage/cache
    networks:
      - local-mcp

networks:
  local-mcp:
    name: local-mcp
