services:
  local-mcp:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: local-mcp:dev
    container_name: local-mcp
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8090}:8080"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/vendor
    networks:
      - local-mcp

networks:
  local-mcp:
    name: local-mcp
